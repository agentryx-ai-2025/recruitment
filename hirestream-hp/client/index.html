<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>HireStream - HP Overseas Job Portal</title>
    <meta name="description" content="HPSEDC Overseas Placement Portal — verified international employment for Himachal Pradesh youth." />
    <meta name="theme-color" content="#1e40af" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <script>
      // Restore saved font size or default to 16px
      var fs = localStorage.getItem("hs-font") || "16";
      document.documentElement.style.fontSize = fs + "px";

      // Restore dark mode preference before render to prevent flash
      if (localStorage.getItem("hs-theme") === "dark") {
        document.documentElement.classList.add("dark");
      }

      // Register service worker for PWA
      if ("serviceWorker" in navigator && location.protocol !== "file:") {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("/sw.js").catch(function () {});
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
