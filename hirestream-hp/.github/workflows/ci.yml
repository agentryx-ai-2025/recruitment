name: CI

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hirestream
          POSTGRES_PASSWORD: hirestream
          POSTGRES_DB: hirestream_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432 -U hirestream; do
            sleep 1
          done

      - name: Apply schema
        env:
          DATABASE_URL: postgresql://hirestream:hirestream@localhost:5432/hirestream_test
          TEST_DATABASE_URL: postgresql://hirestream:hirestream@localhost:5432/hirestream_test
        run: npm run db:push:test || true

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Unit tests
        env:
          NODE_ENV: test
          TEST_DATABASE_URL: postgresql://hirestream:hirestream@localhost:5432/hirestream_test
          SESSION_SECRET: ci-test-secret-do-not-use-in-prod
        run: npm run test:unit

      - name: Integration tests
        env:
          NODE_ENV: test
          TEST_DATABASE_URL: postgresql://hirestream:hirestream@localhost:5432/hirestream_test
          SESSION_SECRET: ci-test-secret-do-not-use-in-prod
        run: npm run test:integration

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: hirestream-build-${{ github.sha }}
          path: dist/
          retention-days: 7

  e2e:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hirestream
          POSTGRES_PASSWORD: hirestream
          POSTGRES_DB: hirestream
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Apply schema
        env:
          DATABASE_URL: postgresql://hirestream:hirestream@localhost:5432/hirestream
        run: npm run db:push || true
      - name: Seed demo data
        env:
          DATABASE_URL: postgresql://hirestream:hirestream@localhost:5432/hirestream
        run: npx tsx scripts/seed.ts
      - name: Run Playwright E2E
        env:
          DATABASE_URL: postgresql://hirestream:hirestream@localhost:5432/hirestream
          SESSION_SECRET: ci-test-secret-do-not-use-in-prod
          CI: "true"
        run: npx playwright test
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
