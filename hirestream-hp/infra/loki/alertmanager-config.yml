# Alertmanager config — PARKED. Only used when the `alerts` profile is enabled
# and the customer has approved a notification channel (Slack / Mattermost /
# Teams / email / etc.). Until then, this file describes the SHAPE; receiver
# URLs are placeholders.

global:
  resolve_timeout: 5m

route:
  receiver: default-receiver
  group_by: ["alertname", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: default-receiver
    # Operator: replace the webhook block below with one of the supported
    # receivers (slack_configs, webhook_configs, email_configs, etc.).
    # Examples:
    #   slack_configs:
    #     - api_url: ${SLACK_WEBHOOK_URL}
    #       channel: "#hirestream-ops"
    #   webhook_configs:
    #     - url: https://your-internal-webhook.example/alerts
    webhook_configs:
      - url: http://placeholder.invalid/disabled
        send_resolved: false

inhibit_rules: []
