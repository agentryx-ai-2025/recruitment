# Promtail — tails HireStream Winston NDJSON logs and ships to Loki.
#
# Schema findings from actual logs/app.log (verified 2026-06-03):
#
#   HTTP-request lines have:   duration, level, message, method, path,
#                              service, statusCode, timestamp
#   Manual log lines have:     level, message, service, timestamp
#
# Fields NOT in the NDJSON (do NOT reference as labels):
#   - route       — Winston emits raw `path`, not a templated route.
#   - errorClass  — derived at read-time by digest.mjs, not in raw lines.
#
# Cardinality decisions (labels = indexed, low-cardinality fields):
#   PROMOTE to label:   level (≤5)  service (1)  method (≤7)  statusCode (≤30)
#   KEEP IN JSON:       path (289+ values, includes UUIDs)  duration  message
#                       Use `| json` parser at query time:
#                         {service="hirestream-api"} | json | statusCode>=500
#                         {level="error"} | json | path=~"/api/v1/jobs/.*"

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /positions/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576

scrape_configs:
  - job_name: hirestream-app
    static_configs:
      - targets:
          - localhost
        labels:
          job: hirestream
          # Path glob below catches: app.log + rotated app1.log..app14.log
          # (NOT *.gz — Winston tailable rotation produces .log files, not gzipped)
          __path__: /var/log/hirestream/app*.log
    pipeline_stages:
      # Parse the NDJSON line.
      - json:
          expressions:
            level: level
            service: service
            method: method
            status_code: statusCode
            timestamp: timestamp
      # Use the embedded timestamp instead of the log file's mtime.
      - timestamp:
          source: timestamp
          format: RFC3339
          fallback_formats:
            - RFC3339Nano
            - 2006-01-02T15:04:05.000Z
      # Promote only the low-cardinality fields to Loki labels.
      - labels:
          level:
          service:
          method:
          status_code:

  - job_name: hirestream-app-error
    static_configs:
      - targets:
          - localhost
        labels:
          job: hirestream-error
          __path__: /var/log/hirestream/error.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            service: service
            timestamp: timestamp
      - timestamp:
          source: timestamp
          format: RFC3339
          fallback_formats:
            - RFC3339Nano
            - 2006-01-02T15:04:05.000Z
      - labels:
          level:
          service:
