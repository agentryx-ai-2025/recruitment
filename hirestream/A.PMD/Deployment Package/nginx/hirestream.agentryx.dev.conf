# /etc/nginx/sites-available/hirestream.agentryx.dev
#
# HireStream — production nginx config for new domain.
#
# Install:
#   sudo cp hirestream.agentryx.dev.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/hirestream.agentryx.dev.conf \
#               /etc/nginx/sites-enabled/hirestream.agentryx.dev.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then issue certs (certbot will rewrite this file to add :443 blocks
# and HTTP→HTTPS redirects automatically):
#   sudo certbot --nginx \
#     -d hirestream.agentryx.dev \
#     -d verify.agentryx.dev \
#     -d hirestream.osipl.dev
#
# The osipl.dev cert keeps the legacy 301 redirect block below valid over HTTPS.

# ── Legacy domain → 301 redirect to new canonical domain ──────────
server {
    listen 80;
    server_name hirestream.osipl.dev;

    # Preserve path + query string in the redirect.
    return 301 https://hirestream.agentryx.dev$request_uri;
}

# ── HireStream — primary app on port 5000 ─────────────────────────
server {
    listen 80;
    server_name hirestream.agentryx.dev;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    access_log /var/log/nginx/hirestream-access.log;
    error_log  /var/log/nginx/hirestream-error.log;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;

        # WebSocket / Vite HMR support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# ── Agentryx Verify — UAT/sign-off portal on port 5002 ────────────
# Safe to leave enabled before the Verify service is deployed:
# nginx will return 502 until something is listening on :5002.
server {
    listen 80;
    server_name verify.agentryx.dev;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    access_log /var/log/nginx/verify-access.log;
    error_log  /var/log/nginx/verify-error.log;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:5002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
