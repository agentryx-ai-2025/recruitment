# Loki + Promtail stack for HireStream log mining.
#
# Base stack (always-on):
#   docker compose up -d loki promtail
#
# Optional profiles (operator opts in when wanted):
#   docker compose --profile grafana up -d grafana       # query UI
#   docker compose --profile alerts  up -d alertmanager  # parked — only when
#                                                       # customer approves a
#                                                       # notification channel
#
# Phase 4 plan: the Operator Console UI will provide log search inside the app
# itself (no separate Grafana login). Grafana stays as an optional power-user
# tool.
#
# Mount: this compose file is meant to live in the deployment host (NOT in
# CI). Adjust the bind-mount path on the `promtail` service to point at the
# HireStream logs/ directory on that host.

version: "3.8"

services:
  loki:
    image: grafana/loki:2.9.10
    container_name: hirestream-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  promtail:
    image: grafana/promtail:2.9.10
    container_name: hirestream-promtail
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    volumes:
      - ./promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      # Bind-mount the HireStream logs/ directory. Relative path resolves
      # against the compose file's location: hirestream/infra/loki/ → ../../logs/
      # so it works regardless of the deployment install path
      # (e.g. /opt/hirestream, /home/<user>/Projects/Recruitment/hirestream, etc.).
      - ../../logs:/var/log/hirestream:ro
      - promtail-positions:/positions
    command: -config.file=/etc/promtail/promtail-config.yml

  grafana:
    image: grafana/grafana:10.4.7
    container_name: hirestream-grafana
    restart: unless-stopped
    profiles: ["grafana"]
    ports:
      - "3000:3000"
    depends_on:
      loki:
        condition: service_healthy
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin-change-me}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-datasource.yml:/etc/grafana/provisioning/datasources/loki.yml:ro

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: hirestream-alertmanager
    restart: unless-stopped
    profiles: ["alerts"]
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager-config.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager

volumes:
  loki-data:
  promtail-positions:
  grafana-data:
  alertmanager-data:
