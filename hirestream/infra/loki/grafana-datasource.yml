# Provisions Loki as a Grafana datasource on first boot. Only active when the
# `grafana` profile is enabled in docker-compose.yml.
apiVersion: 1
datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: false
    jsonData:
      maxLines: 1000
